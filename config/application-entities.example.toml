# Use either [[application_entities.*]] or [[aes.*]], not both; otherwise
# parsing fails with a duplicate-field error.

[[application_entities.local]] # or [[aes.local]]
title = "RUSTCOON"
bind_address = "127.0.0.1:11112"
read_timeout_seconds = 30 # omit to disable timeout
write_timeout_seconds = 30 # omit to disable timeout
max_concurrent_associations = 64
max_pdu_length = 65536

[[application_entities.remote]] # or [[aes.remote]]
title = "REMOTE_AE"
address = "192.0.2.10:104"
connect_timeout_seconds = 5 # omit to disable timeout
read_timeout_seconds = 30 # omit to disable timeout
write_timeout_seconds = 30 # omit to disable timeout
max_pdu_length = 65536
