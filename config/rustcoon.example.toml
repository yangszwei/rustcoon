[app]
name = "rustcoon"

[runtime]
shutdown_timeout_seconds = 30
force_exit_on_timeout = false

[runtime.dimse]
global_max_concurrent_associations = 1024
permit_wait_timeout_seconds = 5

[database]
type = "postgres"
connection_string = "postgres://postgres:postgres@127.0.0.1:5432/rustcoon"
max_connections = 10

[filesystem]
root = "data"

[storage]
type = "filesystem"

[telemetry]
log_level = "info"
log_format = "json"

[telemetry.tracing]
enabled = true

[telemetry.tracing.otlp]
endpoint = "http://127.0.0.1:4317"
protocol = "grpc"
timeout_seconds = 10

[telemetry.metrics]
enabled = true
export_interval_seconds = 30

[telemetry.metrics.otlp]
endpoint = "http://127.0.0.1:4317"
protocol = "grpc"
timeout_seconds = 10
